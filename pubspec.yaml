name: ro_vending_machine
description: RO Vending Machine App - Smart Water Dispensing Solution
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.7.0
  firebase_messaging: ^14.9.0

  # State Management
  provider: ^6.1.1
  
  # HTTP (API Service Layer)
  http: ^1.2.0
  
  # Navigation
  go_router: ^13.0.1

  # Map - OpenStreetMap (no API key needed)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0

  # QR Scanner
  mobile_scanner: ^3.5.6
  qr_flutter: ^4.1.0

  # Payment
  razorpay_flutter: ^1.3.6

  # Chat
  dash_chat_2: ^0.0.21

  # UI
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  fl_chart: ^0.66.1
  intl: ^0.19.0
  
  # Utils
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  url_launcher: ^6.2.4
  connectivity_plus: ^5.0.2
  flutter_local_notifications: ^17.1.1
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/